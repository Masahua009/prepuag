<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="512" height="512" rx="100" fill="url(#bg)" />
  <!-- Graduation cap -->
  <g transform="translate(256,230)" fill="white" stroke="white" stroke-width="4">
    <!-- Cap base -->
    <polygon points="-120,40 0,-60 120,40" fill="white" stroke="white" stroke-width="6" stroke-linejoin="round"/>
    <!-- Cap top flat -->
    <rect x="-120" y="30" width="240" height="15" rx="4" fill="white"/>
    <!-- Tassel -->
    <line x1="120" y1="35" x2="150" y2="80" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <circle cx="150" cy="85" r="15" fill="#fbbf24" stroke="#f59e0b" stroke-width="3"/>
  </g>
  <!-- "UAG" text -->
  <text x="256" y="400" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="4">UAG</text>
</svg>
